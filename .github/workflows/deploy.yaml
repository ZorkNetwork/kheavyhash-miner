name: Build and upload assets
# Shows the tag in the Actions run list (e.g. "Release v1.0.3-ZN").
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*-ZN"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Build gnu-linux on ubuntu-24.04 and musl on ubuntu latest
        os: [ ubuntu-24.04, windows-latest, macos-latest ]
        features: ["default", "kaspacuda/overclock"]
        exclude:
          - os: macos-latest
            features: "kaspacuda/overclock"
    name: Building, ${{ matrix.os }} ${{ matrix.features }}
    steps:
      - name: Fix CRLF on Windows
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Fix LibOpenCL on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install ocl-icd-opencl-dev -y

      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Protoc
        uses: ./.github/actions/install-protoc

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS x86_64 Rust target
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin

      - name: Install CUDA Linux
        if: runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.8.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart"]'

      - name: Install CUDA Windows
        if: runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.8.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart"]'

      - name: Build on Linux GNU
        if: matrix.os == 'ubuntu-24.04'
        # We're using musl to make the binaries statically linked and portable
        run: |
          cargo build --target=x86_64-unknown-linux-gnu --release --all --features ${{ matrix.features }}
          feature_name=${{ matrix.features }}
          tag_name="${GITHUB_REF_NAME}"
          asset_name="kheavyhash-miner-${tag_name}-${feature_name/\//-}-linux-gnu-amd64"
          strip ./target/x86_64-unknown-linux-gnu/release/kheavyhash-miner
          mkdir "${asset_name}"
          mv ./target/x86_64-unknown-linux-gnu/release/kheavyhash-miner "${asset_name}/${asset_name}"
          mv ./target/x86_64-unknown-linux-gnu/release/libkaspa*.so "${asset_name}/"
          tar czvf "${asset_name}.tgz" "${asset_name}"
          echo "archive=${asset_name}.tgz" >> "$GITHUB_ENV"
          echo "asset_name=${asset_name}.tgz" >> "$GITHUB_ENV"

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cargo build --target=x86_64-pc-windows-msvc --release --all --features ${{ matrix.features }}
          feature_name=${{ matrix.features }}
          tag_name="${GITHUB_REF_NAME}"
          asset_name="kheavyhash-miner-${tag_name}-${feature_name/\//-}-win64-amd64"
          mkdir "${asset_name}"
          mv ./target/x86_64-pc-windows-msvc/release/kheavyhash-miner.exe "${asset_name}/${asset_name}.exe"
          mv ./target/x86_64-pc-windows-msvc/release/kaspa*.dll "${asset_name}/"
          bash ./integrations/windows/create_bat.sh "${asset_name}"
          7z a -tzip -r "${asset_name}.zip" "${asset_name}"
          echo "archive=${asset_name}.zip" >> "$GITHUB_ENV"
          echo "asset_name=${asset_name}.zip" >> "$GITHUB_ENV"

      - name: Build on MacOS
        if: matrix.os == 'macos-latest'
        run: |
          cargo build --target=x86_64-apple-darwin --release -p kheavyhash-miner
          tag_name="${GITHUB_REF_NAME}"
          asset_name="kheavyhash-miner-${tag_name}-cpu-only-osx-amd64"
          mkdir "${asset_name}"
          mv ./target/x86_64-apple-darwin/release/kheavyhash-miner "${asset_name}/${asset_name}"
          tar czvf "${asset_name}.tgz" "${asset_name}"
          echo "archive=${asset_name}.tgz" >> "$GITHUB_ENV"
          echo "asset_name=${asset_name}.tgz" >> "$GITHUB_ENV"

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: "./${{ env.archive }}"

      # upload-artifact name: must not contain "/"; expressions have no replace() — sanitize in bash.
      - name: Set workflow artifact name
        shell: bash
        run: |
          f='${{ matrix.features }}'
          echo "workflow_artifact_name=${{ matrix.os }}-${f//\//-}-${{ env.asset_name }}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.workflow_artifact_name }}
          path: "./${{ env.archive }}"

  build-arm64:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            asset_suffix: linux-gnu-arm64
            archive_ext: tgz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_suffix: osx-arm64
            archive_ext: tgz
    name: Building ARM64, ${{ matrix.target }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Protoc
        uses: ./.github/actions/install-protoc

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install AArch64 cross compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu

      - name: Add rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build ARM64 binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: |
          cargo build --target=${{ matrix.target }} --release -p kheavyhash-miner
          tag_name="${GITHUB_REF_NAME}"
          asset_name="kheavyhash-miner-${tag_name}-cpu-only-${{ matrix.asset_suffix }}"
          mkdir "${asset_name}"
          mv ./target/${{ matrix.target }}/release/kheavyhash-miner "${asset_name}/${asset_name}"
          if [ -d "./target/${{ matrix.target }}/release" ]; then
            mv ./target/${{ matrix.target }}/release/libkaspa*.so "${asset_name}/" 2>/dev/null || true
            mv ./target/${{ matrix.target }}/release/libkaspa*.dylib "${asset_name}/" 2>/dev/null || true
          fi
          tar czvf "${asset_name}.tgz" "${asset_name}"
          echo "archive=${asset_name}.tgz" >> "$GITHUB_ENV"
          echo "asset_name=${asset_name}.tgz" >> "$GITHUB_ENV"

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: "./${{ env.archive }}"

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.os }}-${{ matrix.target }}-${{ env.asset_name }}"
          path: "./${{ env.archive }}"

  intergrations:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # Build gnu-linux on ubuntu-24.04 and musl on ubuntu latest
        itegration: [ hiveos ]
    name: Integrating, ${{ matrix.itegration }}
    steps:
      - name: Fix LibOpenCL on Linux
        run: |
          sudo apt update
          sudo apt install ocl-icd-opencl-dev -y

      - name: Check out code into the module directory
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Protoc
        uses: ./.github/actions/install-protoc

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CUDA Linux
        if: runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.8.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart"]'

      - name: Build ${{ matrix.itegration }} Script
        run: |
          cargo build --target=x86_64-unknown-linux-gnu --release --all
          tag_name="${GITHUB_REF_NAME}"
          binary_name="kheavyhash-miner-${tag_name}-linux-gnu-amd64"
          asset_name="kheavyhash-miner-${{ matrix.itegration }}"
          strip ./target/x86_64-unknown-linux-gnu/release/kheavyhash-miner
          mkdir kheavyhash-miner
          mv ./target/x86_64-unknown-linux-gnu/release/kheavyhash-miner "kheavyhash-miner/${binary_name}"
          mv ./target/x86_64-unknown-linux-gnu/release/libkaspa*.so kheavyhash-miner/
          bash "integrations/${{ matrix.itegration }}/build.sh" "${tag_name}" "${binary_name}" kheavyhash-miner
          echo "archive=${asset_name}.tgz" >> "$GITHUB_ENV"
          echo "asset_name=${asset_name}.tgz" >> "$GITHUB_ENV"

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: "./${{ env.archive }}"

      - name: Upload integration artifact
        uses: actions/upload-artifact@v4
        with:
          name: "integration-${{ matrix.itegration }}-${{ env.asset_name }}"
          path: "./${{ env.archive }}"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - build-arm64
      - intergrations
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Conventional Commits release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          # Find previous tag in this series (v*-ZN) reachable from this tag
          prev_tag="$(git tag --sort=creatordate --merged "${tag}" 'v*-ZN' | grep -v "^${tag}\$" | tail -n1 || true)"
          if [ -z "${prev_tag}" ]; then
            range="${tag}"
          else
            range="${prev_tag}..${tag}"
          fi

          notes_file="release-notes.md"
          echo "# ${tag}" > "${notes_file}"
          echo >> "${notes_file}"

          feats=""
          fixes=""
          perf=""
          ci=""
          docs=""
          refactors=""
          others=""

          # Use process substitution so the loop is not in a pipe subshell (variables would not persist).
          while IFS= read -r line; do
            [ -z "${line}" ] && continue
            type="${line%%:*}"
            rest="${line#*: }"
            [ "${rest}" = "${line}" ] && rest="${line}"
            case "${type}" in
              feat* )   feats+=$'- '"${rest}"$'\n' ;;
              fix* )    fixes+=$'- '"${rest}"$'\n' ;;
              perf* )   perf+=$'- '"${rest}"$'\n' ;;
              refactor* ) refactors+=$'- '"${rest}"$'\n' ;;
              ci* )     ci+=$'- '"${rest}"$'\n' ;;
              docs* )   docs+=$'- '"${rest}"$'\n' ;;
              * )       others+=$'- '"${line}"$'\n' ;;
            esac
          done < <(git log --format='%s' "${range}")

          write_section () {
            local title="$1"
            local body="$2"
            if [ -n "${body}" ]; then
              echo "## ${title}" >> "${notes_file}"
              printf '%s\n' "${body}" >> "${notes_file}"
              echo >> "${notes_file}"
            fi
          }

          write_section "Features" "${feats}"
          write_section "Fixes" "${fixes}"
          write_section "Performance" "${perf}"
          write_section "Refactors" "${refactors}"
          write_section "CI" "${ci}"
          write_section "Docs" "${docs}"
          write_section "Other Changes" "${others}"

          echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"

      # draft: true — required if the repo uses immutable releases: assets must be
      # attached while the release is still a draft; publish the draft from the UI after CI.
      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          draft: true
          prerelease: false
          files: dist/**
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
