name: Build and upload assets
# Shows the tag in the Actions run list (e.g. "Release v1.0.3-ZN").
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*-ZN"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            features: default
            cpu: x86_64
            gpu_enabled: true
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04
            features: kaspacuda/overclock
            cpu: x86_64
            gpu_enabled: true
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04
            features: default
            cpu: aarch64-linux
            target: aarch64-unknown-linux-gnu
            strip_prefix: aarch64-linux-gnu-
          - os: ubuntu-24.04
            features: default
            cpu: riscv64-linux
            target: riscv64gc-unknown-linux-gnu
            strip_prefix: riscv64-linux-gnu-
          - os: macos-latest
            features: default
            cpu: aarch64-darwin
            target: aarch64-apple-darwin
          - os: windows-latest
            features: default
            cpu: x86_64
            gpu_enabled: true
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            features: kaspacuda/overclock
            cpu: x86_64
            gpu_enabled: true
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            features: default
            cpu: x86_64
            target: x86_64-apple-darwin
    name: Building, ${{ matrix.os }} ${{ matrix.features }} ${{ matrix.cpu }}
    steps:
      - name: Fix CRLF on Windows
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Fix LibOpenCL on Linux
        if: runner.os == 'Linux' && matrix.cpu == 'x86_64'
        run: |
          set -euo pipefail
          sudo apt update
          sudo apt install ocl-icd-opencl-dev -y

      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Protoc
        uses: ./.github/actions/install-protoc

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS x86_64 Rust target
        if: matrix.os == 'macos-latest' && matrix.cpu == 'x86_64'
        run: rustup target add x86_64-apple-darwin

      - name: Add rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Install CUDA
        if: matrix.gpu_enabled == true
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.8.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart"]'

      - name: Install AArch64 cross compiler (Linux)
        if: matrix.cpu == 'aarch64-linux'
        run: |
          set -euo pipefail
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu

      - name: Install RISC-V cross compiler
        if: matrix.cpu == 'riscv64-linux'
        run: |
          set -euo pipefail
          sudo apt update
          sudo apt install -y gcc-riscv64-linux-gnu

      - name: GPU enabled build
        if: matrix.gpu_enabled == true
        shell: bash
        run: |
          set -euo pipefail
          cargo build --target=${{ matrix.target }} --release --all --features ${{ matrix.features }}
          feature_name=${{ matrix.features }}
          tag_name="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          case "${target}" in
            *linux*)
              asset_suffix="linux-gnu-amd64"
              exec_suffix=""
              lib_suffix=".so"
              ;;
            *windows*)
              asset_suffix="win64-amd64"
              exec_suffix=".exe"
              lib_suffix=".dll"
              ;;
            *)
              asset_suffix="unknown"
              exec_suffix=""
              lib_suffix=".unknown"
              ;;
          esac
          if [ "${{ runner.os }}" = "Linux" ]; then
            strip "./target/${{ matrix.target }}/release/kheavyhash-miner${exec_suffix}"
          fi
          asset_name="kheavyhash-miner-${tag_name}-${feature_name/\//-}-${asset_suffix}"
          mkdir "${asset_name}"
          tb="./target/${{ matrix.target }}/release"
          mv "${tb}/kheavyhash-miner${exec_suffix}" "${asset_name}/${asset_name}${exec_suffix}"
          mv "${tb}"/*${lib_suffix} "${asset_name}/"
          if [ "${{ matrix.os }}" != "windows-latest" ]; then
            tar czvf "${asset_name}.tgz" "${asset_name}"
            echo "archive=${asset_name}.tgz" >> "$GITHUB_ENV"
            echo "asset_name=${asset_name}.tgz" >> "$GITHUB_ENV"
          else
            bash ./integrations/windows/create_bat.sh "${asset_name}"
            7z a -tzip -r "${asset_name}.zip" "${asset_name}"
            echo "archive=${asset_name}.zip" >> "$GITHUB_ENV"
            echo "asset_name=${asset_name}.zip" >> "$GITHUB_ENV"
          fi

      - name: CPU only build
        if: matrix.gpu_enabled != true
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-gcc
          CC_riscv64gc_unknown_linux_gnu: riscv64-linux-gnu-gcc
        run: |
          set -euo pipefail
          cargo build --target=${{ matrix.target }} --release -p kheavyhash-miner
          tag_name="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          case "${target}" in
            *linux*)
              asset_os="linux"
              ;;
            *darwin*)
              asset_os="MacOS"
              ;;
            *)
              asset_os="unknown"
              ;;
          esac
          strip_prefix="${{ matrix.strip_prefix }}"
          if [ "${{ runner.os }}" = "Linux" ]; then
            "${strip_prefix}strip" --strip-all ./target/${{ matrix.target }}/release/kheavyhash-miner
          else
            strip ./target/${{ matrix.target }}/release/kheavyhash-miner
          fi
          cpu_name="${{ matrix.cpu }}"
          case "${cpu_name}" in
            *x86_64*)
              asset_cpu="amd64"
              ;;
            *aarch64*)
              asset_cpu="arm64"
              ;;
            *riscv64*)
              asset_cpu="riscv64"
              ;;
            *)
              asset_cpu="unknown"
              ;;
          esac
          asset_name="kheavyhash-miner-${tag_name}-cpu-only-${asset_os}-${asset_cpu}"
          mkdir "${asset_name}"
          mv ./target/${{ matrix.target }}/release/kheavyhash-miner "${asset_name}/${asset_name}"
          tar czvf "${asset_name}.tgz" "${asset_name}"
          echo "archive=${asset_name}.tgz" >> "$GITHUB_ENV"
          echo "asset_name=${asset_name}.tgz" >> "$GITHUB_ENV"

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: "./${{ env.archive }}"

      # upload-artifact name: must not contain "/"; expressions have no replace() — sanitize in bash.
      - name: Set workflow artifact name
        shell: bash
        run: |
          set -euo pipefail
          f='${{ matrix.features }}'
          cpu='${{ matrix.cpu }}'
          if [ "$cpu" = aarch64-linux ]; then
            echo "workflow_artifact_name=ubuntu-24.04-aarch64-unknown-linux-gnu-${{ env.asset_name }}" >> "$GITHUB_ENV"
          elif [ "$cpu" = riscv64-linux ]; then
            echo "workflow_artifact_name=ubuntu-24.04-riscv64gc-unknown-linux-gnu-${{ env.asset_name }}" >> "$GITHUB_ENV"
          elif [ "$cpu" = aarch64-darwin ]; then
            echo "workflow_artifact_name=macos-latest-aarch64-apple-darwin-${{ env.asset_name }}" >> "$GITHUB_ENV"
          else
            echo "workflow_artifact_name=${{ matrix.os }}-${f//\//-}-${{ env.asset_name }}" >> "$GITHUB_ENV"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.workflow_artifact_name }}
          path: "./${{ env.archive }}"

  intergration:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        itegration: [ hiveos ]
    name: Integrating, ${{ matrix.itegration }}
    steps:
      - name: Fix LibOpenCL on Linux
        run: |
          set -euo pipefail
          sudo apt update
          sudo apt install ocl-icd-opencl-dev -y

      - name: Check out code into the module directory
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Protoc
        uses: ./.github/actions/install-protoc

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CUDA Linux
        if: runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.8.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart"]'

      - name: Build ${{ matrix.itegration }} Script
        run: |
          set -euo pipefail
          cargo build --target=x86_64-unknown-linux-gnu --release --all
          tag_name="${GITHUB_REF_NAME}"
          binary_name="kheavyhash-miner-${tag_name}-linux-gnu-amd64"
          asset_name="kheavyhash-miner-${{ matrix.itegration }}"
          strip ./target/x86_64-unknown-linux-gnu/release/kheavyhash-miner
          mkdir kheavyhash-miner
          mv ./target/x86_64-unknown-linux-gnu/release/kheavyhash-miner "kheavyhash-miner/${binary_name}"
          mv ./target/x86_64-unknown-linux-gnu/release/libkaspa*.so kheavyhash-miner/
          bash "integrations/${{ matrix.itegration }}/build.sh" "${tag_name}" "${binary_name}" kheavyhash-miner
          echo "archive=${asset_name}.tgz" >> "$GITHUB_ENV"
          echo "asset_name=${asset_name}.tgz" >> "$GITHUB_ENV"

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: "./${{ env.archive }}"

      - name: Upload integration artifact
        uses: actions/upload-artifact@v4
        with:
          name: "integration-${{ matrix.itegration }}-${{ env.asset_name }}"
          path: "./${{ env.archive }}"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - intergration
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Conventional Commits release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          # Find previous tag in this series (v*-ZN) reachable from this tag
          prev_tag="$(git tag --sort=creatordate --merged "${tag}" 'v*-ZN' | grep -v "^${tag}\$" | tail -n1 || true)"
          if [ -z "${prev_tag}" ]; then
            range="${tag}"
          else
            range="${prev_tag}..${tag}"
          fi

          notes_file="release-notes.md"
          echo "# ${tag}" > "${notes_file}"
          echo >> "${notes_file}"

          feats=""
          fixes=""
          perf=""
          ci=""
          docs=""
          refactors=""
          others=""

          # Use process substitution so the loop is not in a pipe subshell (variables would not persist).
          while IFS= read -r line; do
            [ -z "${line}" ] && continue
            type="${line%%:*}"
            rest="${line#*: }"
            [ "${rest}" = "${line}" ] && rest="${line}"
            case "${type}" in
              feat* )   feats+=$'- '"${rest}"$'\n' ;;
              fix* )    fixes+=$'- '"${rest}"$'\n' ;;
              perf* )   perf+=$'- '"${rest}"$'\n' ;;
              refactor* ) refactors+=$'- '"${rest}"$'\n' ;;
              ci* )     ci+=$'- '"${rest}"$'\n' ;;
              docs* )   docs+=$'- '"${rest}"$'\n' ;;
              * )       others+=$'- '"${line}"$'\n' ;;
            esac
          done < <(git log --format='%s' "${range}")

          write_section () {
            local title="$1"
            local body="$2"
            if [ -n "${body}" ]; then
              echo "## ${title}" >> "${notes_file}"
              printf '%s\n' "${body}" >> "${notes_file}"
              echo >> "${notes_file}"
            fi
          }

          write_section "Features" "${feats}"
          write_section "Fixes" "${fixes}"
          write_section "Performance" "${perf}"
          write_section "Refactors" "${refactors}"
          write_section "CI" "${ci}"
          write_section "Docs" "${docs}"
          write_section "Other Changes" "${others}"

          echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"

      # draft: true — required if the repo uses immutable releases: assets must be
      # attached while the release is still a draft; publish the draft from the UI after CI.
      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          draft: true
          prerelease: false
          files: dist/**
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
